name: LAMP Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: COP4331
          MYSQL_USER: TheBeast
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2 php php-mysql libapache2-mod-php php-cli php-curl php-xml unzip 

      - name: Configure Apache
        run: |
          sudo rm -rf /var/www/html/*
          sudo cp -r $GITHUB_WORKSPACE/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo systemctl restart apache2

      - name: Wait for MySQL
        run: |
          for i in {1..10}; do
            mysqladmin ping -h127.0.0.1 -utest_user -ptest_pass && break
            sleep 3
          done

      - name: Install Composer dependencies
        run: |
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install

      - name: Run integration tests (PHPUnit)
        run: |
          ./vendor/bin/phpunit --testsuite=integration
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: test_db
          DB_USERNAME: test_user
          DB_PASSWORD: test_pass
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install jest

      - name: Run tests
        run: npm run test ./js/integration.test.js
      

